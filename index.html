    function calcScore(autoMatched, manualChecked) {

    // ========== CSV PARSER ==========
    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
      return lines.slice(1).map(line => {
        const vals = parseCSVLine(line);
        const row = {};
        headers.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
        return row;
      }).filter(row => Object.values(row).some(v => v));
    }

    function parseCSVLine(line) {
      const result = []; let current = ''; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
          else if (ch === '"') inQuotes = false;
          else current += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') { result.push(current); current = ''; }
          else current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function mapField(headers, targets) {
      for (const t of targets) {
        const h = headers.find(h => h.includes(t));
        if (h) return h;
      }
      return null;
    }

    async function runApifySearch(query, maxResults = 50) {
      // Use run-sync-get-dataset-items endpoint — single call, waits for completion, returns results directly
      // Timeout set to 120s. For larger result sets, increase or switch to async polling.
      const token = getApifyToken();
      if (!token) throw new Error('No API token configured. Go to the Download modal and enter your token.');
      const url = `https://api.apify.com/v2/acts/${encodeURIComponent(APIFY_ACTOR_ID)}/run-sync-get-dataset-items?token=${token}&timeout=120`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          searchStringsArray: [query],
          maxCrawledPlacesPerSearch: maxResults,
          language: 'en',
          maxReviews: 0
        })
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Download error ${res.status}: ${text.slice(0, 200)}`);
      }
      const items = await res.json();
      return items.map(apifyResultToAttorney);
    }

    function StoreProvider({ children }) {
      const hasData = loadStorage('crm_attorneys', []).length > 0;
      const seed = !hasData ? generateDemoData() : null;
      const [state, dispatch] = useReducer(storeReducer, {
        attorneys: hasData ? loadStorage('crm_attorneys', []) : seed.attorneys,
        seminars: hasData ? loadStorage('crm_seminars', []) : seed.seminars,
        programSetup: hasData ? loadStorage('crm_programSetup', DEFAULT_SETUP) : seed.programSetup,
        attendees: hasData ? loadStorage('crm_attendees', []) : seed.attendees
      });

      useEffect(() => { saveStorage('crm_attorneys', state.attorneys); }, [state.attorneys]);
      useEffect(() => { saveStorage('crm_seminars', state.seminars); }, [state.seminars]);
      useEffect(() => { saveStorage('crm_programSetup', state.programSetup); }, [state.programSetup]);
      useEffect(() => { saveStorage('crm_attendees', state.attendees); }, [state.attendees]);

      return <StoreContext.Provider value={{ state, dispatch }}>{children}</StoreContext.Provider>;
    }

    function useStore() { return useContext(StoreContext); }

    // ========== UI COMPONENTS ==========
    function Badge({ children, color = 'bg-gray-600' }) {
      return <span className={`${color} text-white text-xs font-semibold px-2 py-0.5 rounded-full`}>{children}</span>;
    }

    function TierBadge({ score }) {
      const t = getTier(score);
      return <Badge color={t.color}>{t.label}</Badge>;
    }

    function PriorityBadge({ priority }) {
      const colors = { REQUIRED: 'bg-red-500/20 text-red-400', PREFERRED: 'bg-blue-500/20 text-blue-400', BONUS: 'bg-amber-500/20 text-amber-400' };
      return <span className={`${colors[priority]} text-xs font-semibold px-2 py-0.5 rounded`}>{priority}</span>;
    }

    function StageBadge({ stage }) {
      const s = STAGES[stage];
      if (!s) return null;
      return <span className="text-xs font-medium px-2 py-0.5 rounded" style={{ background: s.color + '22', color: s.color }}>{s.name}</span>;
    }

    function StarRating({ rating }) {
      const stars = [];
      for (let i = 1; i <= 5; i++) {
        stars.push(<span key={i} className={i <= Math.round(rating) ? 'text-amber-400' : 'text-gray-600'}>&#9733;</span>);
      }
      return <span className="text-sm">{stars} <span className="text-gray-400 ml-1">{rating.toFixed(1)}</span></span>;
    }

    function Modal({ open, onClose, title, children, wide }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60" onClick={onClose}>
          <div className={`bg-dark-800 rounded-xl shadow-2xl border border-dark-600 max-h-[90vh] overflow-y-auto fade-in ${wide ? 'w-[900px] max-w-[95vw]' : 'w-[600px] max-w-[90vw]'}`} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-5 border-b border-dark-600">
              <h2 className="text-lg font-semibold">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Tabs({ tabs, active, onChange }) {
      return (
        <div className="flex gap-1 border-b border-dark-600 mb-4">
          {tabs.map(t => (
            <button key={t} onClick={() => onChange(t)}
              className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors ${active === t ? 'border-navy-500 text-white' : 'border-transparent text-gray-400 hover:text-gray-200'}`}>
              {t}
            </button>
          ))}
        </div>
      );
    }

    // ========== SIMPLE BAR CHART ==========
    function BarChart({ data, height = 200 }) {
      const max = Math.max(...data.map(d => d.value), 1);
      return (
        <div className="flex items-end gap-2" style={{ height }}>
          {data.map((d, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <span className="text-xs font-bold text-white">{d.value}</span>
              <div className="w-full rounded-t-md transition-all" style={{ height: `${(d.value / max) * (height - 40)}px`, background: d.color || '#4f6ef7', minHeight: d.value > 0 ? 4 : 0 }} />
              <span className="text-xs text-gray-400 text-center truncate w-full">{d.label}</span>
            </div>
          ))}
        </div>
      );
    }

    // ========== APIFY SEARCH MODAL ==========
    function ApifySearchModal({ open, onClose }) {
      const { dispatch } = useStore();
      const [query, setQuery] = useState('estate planning attorney Tampa FL');
      const [maxResults, setMaxResults] = useState(20);
      const [status, setStatus] = useState('idle');
      const [results, setResults] = useState([]);
      const [error, setError] = useState('');
      const [token, setToken] = useState(getApifyToken());
      const [showToken, setShowToken] = useState(false);

      function saveToken(t) { setToken(t); setApifyToken(t); }

      async function handleSearch() {
        setStatus('searching');
        setError('');
        try {
          const attorneys = await runApifySearch(query, maxResults);
          setResults(attorneys);
          setStatus('preview');
        } catch (e) {
          setError(e.message);
          setStatus('error');
        }
      }

      function doImport() {
        dispatch({ type: 'ADD_ATTORNEYS', payload: results });
        setResults([]);
        setStatus('idle');
        onClose();
      }

      return (
        <Modal open={open} onClose={() => { setStatus('idle'); setResults([]); onClose(); }} title="Download Attorneys from Google Maps" wide>
          {status === 'idle' || status === 'error' ? (
            <div className="space-y-4">
              <p className="text-gray-400 text-sm">Search Google Maps to download attorneys. Results are auto-scored and imported.</p>
              <div className="bg-dark-700 rounded-lg p-3">
                <div className="flex items-center justify-between mb-1">
                  <label className="text-xs text-gray-400">API Token</label>
                  <button onClick={() => setShowToken(!showToken)} className="text-xs text-navy-400 hover:text-navy-300">{showToken ? 'Hide' : 'Configure'}</button>
                </div>
                {showToken ? (
                  <input type="password" value={token} onChange={e => saveToken(e.target.value)} placeholder="Enter your API token" className="w-full px-3 py-2 rounded-lg border text-sm" />
                ) : (
                  <div className="text-xs text-gray-500">{token ? 'Token configured' : 'No token set — click Configure'}</div>
                )}
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Search Query</label>
                <input value={query} onChange={e => setQuery(e.target.value)} placeholder="e.g., estate planning attorney Tampa FL"
                  className="w-full px-3 py-2 rounded-lg border text-sm" />
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Max Results</label>
                <input type="number" value={maxResults} onChange={e => setMaxResults(parseInt(e.target.value) || 20)} min={1} max={100}
                  className="w-32 px-3 py-2 rounded-lg border text-sm" />
              </div>
              {error && <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 text-red-400 text-sm">{error}</div>}
              <div className="flex items-center gap-3">
                <button onClick={handleSearch} className="px-4 py-2 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white">Download</button>
                <span className="text-xs text-gray-500">Searches Google Maps for results</span>
              </div>
            </div>
          ) : status === 'searching' ? (
            <div className="text-center py-12">
              <div className="inline-block w-8 h-8 border-2 border-navy-500 border-t-transparent rounded-full animate-spin mb-4" />
              <p className="text-gray-400">Downloading attorneys from Google Maps...</p>
              <p className="text-xs text-gray-500 mt-1">This may take 30-90 seconds depending on result count</p>
            </div>
          ) : status === 'preview' ? (
            <div>
              <p className="text-green-400 text-sm mb-3 font-medium">{results.length} attorneys found. Review and confirm import:</p>
              <div className="max-h-64 overflow-y-auto border border-dark-600 rounded-lg mb-4">
                <table className="w-full text-sm">
                  <thead className="bg-dark-700 sticky top-0"><tr>
                    <th className="text-left p-2 text-gray-400">Name</th>
                    <th className="text-left p-2 text-gray-400">Firm</th>
                    <th className="text-left p-2 text-gray-400">City</th>
                    <th className="text-left p-2 text-gray-400">Rating</th>
                    <th className="text-left p-2 text-gray-400">Score</th>
                    <th className="text-left p-2 text-gray-400">Tier</th>
                  </tr></thead>
                  <tbody>
                    {results.map(a => (
                      <tr key={a.id} className="border-t border-dark-600">
                        <td className="p-2">{a.firstName} {a.lastName}</td>
                        <td className="p-2 text-gray-400">{a.firmName}</td>
                        <td className="p-2 text-gray-400">{a.city}</td>
                        <td className="p-2">{a.googleRating > 0 ? <StarRating rating={a.googleRating} /> : '—'}</td>
                        <td className="p-2 font-semibold">{a.score}</td>
                        <td className="p-2"><TierBadge score={a.score} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="flex gap-3 justify-end">
                <button onClick={() => { setStatus('idle'); setResults([]); }} className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white border border-dark-600">Back</button>
                <button onClick={doImport} className="px-4 py-2 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white">Import {results.length} Attorneys</button>
              </div>
            </div>
          ) : null}

    // ========== CSV IMPORT MODAL ==========
    function CsvImportModal({ open, onClose }) {
      const { dispatch } = useStore();
      const [preview, setPreview] = useState(null);
      const fileRef = useRef();

      function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const rows = parseCSV(ev.target.result);
          if (!rows.length) { alert('No data found in CSV'); return; }
          const headers = Object.keys(rows[0]);
          const attorneys = rows.map(r => csvRowToAttorney(r, headers));
          setPreview(attorneys);
        };
        reader.readAsText(file);
      }

      function doImport() {
        if (!preview) return;
        dispatch({ type: 'ADD_ATTORNEYS', payload: preview });
        setPreview(null);
        onClose();
      }

      return (
        <Modal open={open} onClose={() => { setPreview(null); onClose(); }} title="Import Attorneys from CSV" wide>
          {!preview ? (
            <div>
              <p className="text-gray-400 text-sm mb-4">Upload a CSV with attorney data.</p>
              <input ref={fileRef} type="file" accept=".csv" onChange={handleFile}
                className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-navy-600 file:text-white hover:file:bg-navy-500 cursor-pointer" />
            </div>
          ) : (
            <div>
              <p className="text-green-400 text-sm mb-3 font-medium">{preview.length} attorneys parsed. Review and confirm import:</p>
              <div className="max-h-64 overflow-y-auto border border-dark-600 rounded-lg mb-4">
                <table className="w-full text-sm">
                  <thead className="bg-dark-700 sticky top-0"><tr>
                    <th className="text-left p-2 text-gray-400">Name</th>
                    <th className="text-left p-2 text-gray-400">Firm</th>
                    <th className="text-left p-2 text-gray-400">City</th>
                    <th className="text-left p-2 text-gray-400">Rating</th>
                    <th className="text-left p-2 text-gray-400">Score</th>
                    <th className="text-left p-2 text-gray-400">Tier</th>
                  </tr></thead>
                  <tbody>
                    {preview.map(a => (
                      <tr key={a.id} className="border-t border-dark-600">
                        <td className="p-2">{a.firstName} {a.lastName}</td>
                        <td className="p-2 text-gray-400">{a.firmName}</td>
                        <td className="p-2 text-gray-400">{a.city}</td>
                        <td className="p-2">{a.googleRating > 0 ? <StarRating rating={a.googleRating} /> : '—'}</td>
                        <td className="p-2 font-semibold">{a.score}</td>
                        <td className="p-2"><TierBadge score={a.score} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="flex gap-3 justify-end">
                <button onClick={() => setPreview(null)} className="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white border border-dark-600">Cancel</button>
                <button onClick={doImport} className="px-4 py-2 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white">Import {preview.length} Attorneys</button>
              </div>
            </div>
          )}
        </Modal>
      );
    }

    // ========== ATTORNEY DETAIL ==========
    function AttorneyDetail({ attorney, onClose }) {
      const { state, dispatch } = useStore();
      const [tab, setTab] = useState('Contact');
      const a = state.attorneys.find(x => x.id === attorney.id) || attorney;

      const update = (changes) => dispatch({ type: 'UPDATE_ATTORNEY', payload: { id: a.id, ...changes } });

      const allChecked = new Set([...(a.autoMatched || []), ...(a.manualChecked || [])]);
      const missingRequired = getMissingRequired(a);

      function toggleCriteria(criteriaId) {
        const manual = [...(a.manualChecked || [])];
        const idx = manual.indexOf(criteriaId);
        if (idx >= 0) manual.splice(idx, 1);
        else manual.push(criteriaId);
        const newScore = calcScore(a.autoMatched || [], manual);
        update({ manualChecked: manual, score: newScore });
      }

      function setStage(newStage) {
        if (newStage >= 5) {
          const missing = getMissingRequired({ ...a });
          if (missing.length > 0) {
            alert(`Cannot approve: Missing required criteria:\n${missing.map(m => '- ' + m.label).join('\n')}`);
            return;
          }
        }
        update({ stage: newStage });
      }

      function setVettingDecision(decision) {
        if (decision === 'approved') {
          const missing = getMissingRequired(a);
          if (missing.length > 0) {
            alert(`Cannot approve: Missing required criteria:\n${missing.map(m => '- ' + m.label).join('\n')}`);
            return;
          }
          update({ vettingDecision: decision, stage: 5 });
        } else {
          update({ vettingDecision: decision });
        }

    // ========== DASHBOARD ==========

      const [setupOpen, setSetupOpen] = useState(false);

      const stageCounts = STAGES.map((_, i) => attorneys.filter(a => a.stage === i).length);
      const completed = seminars.filter(s => s.status === 'completed');

              <div className="text-sm text-gray-400">Total Attorneys</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold">{completed.length}</div>
              <div className="text-sm text-gray-400">Seminars Completed</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">

              <div className="text-sm text-gray-400">Total Attendees</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold text-green-400">{clientsWon}</div>
              <div className="text-sm text-gray-400">Clients Won</div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-3">Tier Breakdown</h3>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2"><Badge color="bg-red-500">HOT</Badge><span className="text-xl font-bold">{tiers.HOT}</span></div>
                <div className="flex items-center gap-2"><Badge color="bg-amber-500">WARM</Badge><span className="text-xl font-bold">{tiers.WARM}</span></div>
                <div className="flex items-center gap-2"><Badge color="bg-gray-500">COLD</Badge><span className="text-xl font-bold">{tiers.COLD}</span></div>
              </div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-3">Consultations Booked</h3>
              <div className="text-3xl font-bold">{totalConsultations}</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-3">Active Policies</h3>
              <div className="text-3xl font-bold text-emerald-400">{policyActive}</div>
            </div>
          </div>

          <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
            <h3 className="text-sm font-semibold text-gray-400 mb-3">Pipeline Overview</h3>
            <div className="flex gap-1">
              {STAGES.map((s, i) => (
                <div key={i} className="flex-1 text-center">
                  <div className="text-lg font-bold" style={{ color: s.color }}>{stageCounts[i]}</div>
                  <div className="text-xs text-gray-500 truncate">{s.name}</div>
                  <div className="h-1.5 rounded-full mt-1" style={{ background: s.color + '33' }}>
                    <div className="h-full rounded-full" style={{ background: s.color, width: attorneys.length ? `${(stageCounts[i] / attorneys.length) * 100}%` : '0%' }} />
                  </div>
                </div>
              ))}

            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-3">Upcoming Seminars</h3>
              <div className="space-y-2">
                {upcoming.map(s => {
                  const atty = attorneys.find(a => a.id === s.attorneyId);
                  return (
                    <div key={s.id} className="flex items-center gap-3 p-2 bg-dark-700 rounded-lg">
                      <div className="text-sm font-medium flex-1">{s.title}</div>
                      <div className="text-xs text-gray-400">{s.date}</div>
                      <div className="text-xs text-gray-400">{s.venue}</div>
                      {atty && <div className="text-xs text-navy-400">{atty.firstName} {atty.lastName}</div>}

          <div className="bg-dark-800 rounded-xl border border-dark-600">
            <button onClick={() => setSetupOpen(!setupOpen)} className="w-full flex items-center justify-between p-4 text-left">
              <h3 className="text-sm font-semibold text-gray-400">AAA Program Setup Checklist</h3>
              <span className="text-gray-500 text-xs">{setupOpen ? '▲' : '▼'}</span>

              <div className="px-4 pb-4 space-y-2 border-t border-dark-600 pt-3">

                <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={programSetup.memberChannelAccess} onChange={e => updateSetup('memberChannelAccess', e.target.checked)} /> Access to member communication channels</label>
                <div className="flex items-center gap-3 text-sm">
                  <span className="text-gray-400 min-w-fit">AAA Contact:</span>
                  <input value={programSetup.aaaContactPerson} onChange={e => updateSetup('aaaContactPerson', e.target.value)} className="flex-1 px-2 py-1 rounded border text-sm" placeholder="Contact name" />
                </div>
                <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={programSetup.attorneyApprovalProcess} onChange={e => updateSetup('attorneyApprovalProcess', e.target.checked)} /> AAA retains final say on attorney presenters</label>
                <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={programSetup.feedbackProcess} onChange={e => updateSetup('feedbackProcess', e.target.checked)} /> Post-event feedback process agreed</label>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========== ATTORNEY LIST ==========
    function AttorneyList() {
      const { state } = useStore();
      const [search, setSearch] = useState('');
      const [tierFilter, setTierFilter] = useState('All');
      const [stageFilter, setStageFilter] = useState('All');
      const [vettingFilter, setVettingFilter] = useState('All');
      const [selectedId, setSelectedId] = useState(null);
      const [showImport, setShowImport] = useState(false);
      const [showManual, setShowManual] = useState(false);
      const [showApify, setShowApify] = useState(false);

      const filtered = useMemo(() => {
        let list = state.attorneys;
        if (search) {
          const s = search.toLowerCase();
          list = list.filter(a => [a.firstName, a.lastName, a.firmName, a.city].some(f => (f || '').toLowerCase().includes(s)));
        }
        if (tierFilter !== 'All') list = list.filter(a => getTier(a.score).label === tierFilter);
        if (stageFilter !== 'All') list = list.filter(a => a.stage === parseInt(stageFilter));
        if (vettingFilter !== 'All') list = list.filter(a => a.vettingDecision === vettingFilter);
        return [...list].sort((a, b) => b.score - a.score);
      }, [state.attorneys, search, tierFilter, stageFilter, vettingFilter]);

      const selected = selectedId ? state.attorneys.find(a => a.id === selectedId) : null;

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-4">
            <h1 className="text-2xl font-bold">Attorneys</h1>
            <div className="flex gap-2">
              <button onClick={() => setShowManual(true)} className="px-3 py-2 rounded-lg text-sm bg-dark-700 border border-dark-600 hover:border-navy-500 text-gray-300">+ Add</button>
              <button onClick={() => setShowImport(true)} className="px-3 py-2 rounded-lg text-sm bg-dark-700 border border-dark-600 hover:border-navy-500 text-gray-300">Import CSV</button>
              <button onClick={() => setShowApify(true)} className="px-3 py-2 rounded-lg text-sm bg-navy-600 hover:bg-navy-500 text-white font-medium">Download</button>
            </div>
          </div>

          <div className="flex flex-wrap gap-3 mb-4">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search name, firm, city..." className="px-3 py-2 rounded-lg border text-sm w-64" />
            <select value={tierFilter} onChange={e => setTierFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
              <option value="All">All Tiers</option>
              <option value="HOT">Hot</option>
              <option value="WARM">Warm</option>
              <option value="COLD">Cold</option>
            </select>
            <select value={stageFilter} onChange={e => setStageFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
              <option value="All">All Stages</option>
              {STAGES.map((s, i) => <option key={i} value={i}>{s.name}</option>)}
            </select>
            <select value={vettingFilter} onChange={e => setVettingFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
              <option value="All">All Vetting</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="not_approved">Not Approved</option>
              <option value="needs_followup">Needs Follow-up</option>
            </select>
            <button onClick={() => exportCSV(filtered)} className="ml-auto px-3 py-2 rounded-lg text-sm bg-dark-700 border border-dark-600 hover:border-dark-500 text-gray-400">Export CSV</button>
          </div>

          <div className="bg-dark-800 rounded-xl border border-dark-600 overflow-hidden">
            <table className="w-full text-sm">
              <thead className="bg-dark-700"><tr>
                <th className="text-left p-3 text-gray-400 font-medium">Name</th>
                <th className="text-left p-3 text-gray-400 font-medium">Firm</th>
                <th className="text-left p-3 text-gray-400 font-medium">City</th>
                <th className="text-left p-3 text-gray-400 font-medium">Rating</th>
                <th className="text-left p-3 text-gray-400 font-medium">Score</th>
                <th className="text-left p-3 text-gray-400 font-medium">Tier</th>
                <th className="text-left p-3 text-gray-400 font-medium">Stage</th>
                <th className="text-left p-3 text-gray-400 font-medium">Vetting</th>
              </tr></thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={8} className="p-8 text-center text-gray-500">No attorneys found. Import a CSV, add manually, or download from Google Maps.</td></tr>
                ) : filtered.map(a => (
                  <tr key={a.id} onClick={() => setSelectedId(a.id)} className="border-t border-dark-600 hover:bg-dark-700 cursor-pointer transition-colors">
                    <td className="p-3 font-medium">{a.firstName} {a.lastName}</td>
                    <td className="p-3 text-gray-400">{a.firmName}</td>
                    <td className="p-3 text-gray-400">{a.city}{a.state ? `, ${a.state}` : ''}</td>
                    <td className="p-3">{a.googleRating > 0 ? <StarRating rating={a.googleRating} /> : '—'}</td>
                    <td className="p-3 font-bold">{a.score}</td>
                    <td className="p-3"><TierBadge score={a.score} /></td>
                    <td className="p-3"><StageBadge stage={a.stage} /></td>
                    <td className="p-3"><span className={`text-xs capitalize ${a.vettingDecision === 'approved' ? 'text-green-400' : a.vettingDecision === 'not_approved' ? 'text-red-400' : 'text-gray-400'}`}>{a.vettingDecision.replace(/_/g, ' ')}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="text-xs text-gray-500 mt-2">{filtered.length} of {state.attorneys.length} attorneys</div>

          {selected && <AttorneyDetail attorney={selected} onClose={() => setSelectedId(null)} />}
          <CsvImportModal open={showImport} onClose={() => setShowImport(false)} />
          <ManualAddModal open={showManual} onClose={() => setShowManual(false)} />
          <ApifySearchModal open={showApify} onClose={() => setShowApify(false)} />
        </div>
      );
    }

    // ========== PIPELINE BOARD ==========
    function PipelineBoard() {
      const { state, dispatch } = useStore();
      const [selectedId, setSelectedId] = useState(null);

      function moveToStage(attorney, newStage) {
        if (newStage >= 5) {
          const missing = getMissingRequired(attorney);
          if (missing.length > 0) {
            alert(`Cannot move to ${STAGES[newStage].name}: Missing required criteria:\n${missing.map(m => '- ' + m.label).join('\n')}`);
            return;
          }
        }
        dispatch({ type: 'UPDATE_ATTORNEY', payload: { id: attorney.id, stage: newStage } });
      }

      const selected = selectedId ? state.attorneys.find(a => a.id === selectedId) : null;

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-4">Pipeline</h1>
          <div className="flex gap-3 overflow-x-auto pb-4" style={{ height: 'calc(100vh - 140px)' }}>
            {STAGES.map((stage, idx) => {
              const cards = state.attorneys.filter(a => a.stage === idx);
              return (
                <div key={idx} className="min-w-[220px] flex-shrink-0 flex flex-col" style={{ height: '100%' }}>
                  <div className="flex items-center gap-2 mb-2 px-1 sticky top-0 z-10 py-2" style={{ background: '#1a1a2e' }}>
                    <div className="w-2.5 h-2.5 rounded-full" style={{ background: stage.color }} />
                    <span className="text-sm font-semibold">{stage.name}</span>
                    <span className="text-xs text-gray-500 ml-auto bg-dark-700 px-1.5 py-0.5 rounded-full">{cards.length}</span>
                  </div>
                  <div className="space-y-2 flex-1 overflow-y-auto bg-dark-800/50 rounded-xl p-2 border border-dark-600/50">
                    {cards.map(a => {
                      const tierColor = a.score >= 70 ? '#ef4444' : a.score >= 40 ? '#f59e0b' : '#6b7280';
                      const daysAgo = a.lastUpdated ? Math.floor((Date.now() - new Date(a.lastUpdated).getTime()) / 86400000) : null;
                      const callLog = a.callLog || [];
                      const lastCall = callLog.length > 0 ? callLog[callLog.length - 1] : null;
                      const [logOpen, setLogOpen] = useState(false);
                      const [logNote, setLogNote] = useState('');
                      const [logOutcome, setLogOutcome] = useState('called');

                      function submitLog(e) {
                        e.stopPropagation();
                        const newLog = { id: genId(), date: new Date().toISOString(), outcome: logOutcome, note: logNote };
                        dispatch({ type: 'UPDATE_ATTORNEY', payload: { id: a.id, callLog: [...callLog, newLog] } });
                        setLogNote(''); setLogOutcome('called'); setLogOpen(false);
                      }

                      return (
                        <div key={a.id} onClick={() => setSelectedId(a.id)}
                          className="bg-dark-800 rounded-lg border border-dark-600 hover:border-dark-500 cursor-pointer transition-colors overflow-hidden flex">
                          <div className="w-1 flex-shrink-0 rounded-l-lg" style={{ background: tierColor }} />
                          <div className="p-2.5 flex-1 min-w-0">
                            <div className="flex items-center justify-between mb-1">
                              <div className="text-sm font-medium truncate">{(a.firstName || a.lastName) ? `${a.firstName} ${a.lastName}`.trim() : a.firmName}</div>
                              <span className="text-xs font-bold ml-2 flex-shrink-0">{a.score}</span>
                            </div>
                            <div className="flex items-center gap-2 mb-1.5 text-xs">
                              {a.phone && <a href={`tel:${a.phone}`} onClick={e => e.stopPropagation()} className="text-navy-400 hover:text-navy-300 truncate">{a.phone}</a>}
                              {a.phone && a.email && <span className="text-gray-600">|</span>}
                              {a.email && <a href={`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(a.email)}`} target="_blank" onClick={e => e.stopPropagation()} className="text-navy-400 hover:text-navy-300 truncate">{a.email}</a>}
                            </div>
                            <div className="flex items-center justify-between">
                              <div className="flex items-center gap-1" title="Outreach: L / 1 / 2 / 3">
                                {['L', '1', '2', '3'].map((label, ei) => (
                                  <span key={ei} className={`text-xs font-medium px-1 rounded ${a.emailStatus[ei] ? 'bg-green-500/25 text-green-400' : 'bg-dark-600 text-gray-600'}`}>{label}</span>
                                ))}
                              </div>
                              {daysAgo !== null && <span className={`text-xs ${daysAgo > 7 ? 'text-red-400' : daysAgo > 3 ? 'text-amber-400' : 'text-gray-500'}`}>{daysAgo === 0 ? 'today' : daysAgo + 'd ago'}</span>}
                            </div>

                            {/* Last call log */}
                            {lastCall && (
                              <div className="mt-1.5 text-xs bg-dark-700 rounded px-1.5 py-1">
                                <div className="flex items-center justify-between">
                                  <span className={`font-medium ${lastCall.outcome === 'connected' ? 'text-green-400' : lastCall.outcome === 'voicemail' ? 'text-amber-400' : lastCall.outcome === 'no_answer' ? 'text-red-400' : 'text-gray-400'}`}>
                                    {lastCall.outcome === 'connected' ? 'Connected' : lastCall.outcome === 'voicemail' ? 'Voicemail' : lastCall.outcome === 'no_answer' ? 'No Answer' : 'Called'}
                                  </span>
                                  <span className="text-gray-600">{new Date(lastCall.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
                                </div>
                                {lastCall.note && <div className="text-gray-400 truncate mt-0.5">Last note: {lastCall.note}</div>}
                              </div>
                            )}

                            {/* Log a call button + dropdown */}
                            <div className="mt-1.5">
                              {!logOpen ? (
                                <button onClick={e => { e.stopPropagation(); setLogOpen(true); }}
                                  className="text-xs text-gray-500 hover:text-navy-400 flex items-center gap-1">
                                  <span>&#9743;</span> Log a call
                                </button>
                              ) : (
                                <div onClick={e => e.stopPropagation()} className="bg-dark-700 rounded-lg p-2 space-y-1.5 fade-in">
                                  <select value={logOutcome} onChange={e => setLogOutcome(e.target.value)} className="w-full px-2 py-1 rounded border text-xs">
                                    <option value="called">Called</option>
                                    <option value="connected">Connected</option>
                                    <option value="voicemail">Left Voicemail</option>
                                    <option value="no_answer">No Answer</option>
                                  </select>
                                  <input value={logNote} onChange={e => setLogNote(e.target.value)} placeholder="Quick note..." className="w-full px-2 py-1 rounded border text-xs" />
                                  <div className="flex gap-1">
                                    <button onClick={submitLog} className="text-xs px-2 py-0.5 rounded bg-navy-600 text-white hover:bg-navy-500">Save</button>
                                    <button onClick={e => { e.stopPropagation(); setLogOpen(false); }} className="text-xs px-2 py-0.5 rounded text-gray-500 hover:text-white">Cancel</button>
                                  </div>
                                </div>
                              )}
                            </div>

                            <div className="flex gap-1.5 mt-2">
                              {idx > 0 && <button onClick={e => { e.stopPropagation(); moveToStage(a, idx - 1); }}
                                className="text-xs text-gray-500 hover:text-white px-1.5 py-1 rounded bg-dark-600 hover:bg-dark-500">&#8592;</button>}
                              {idx === 0 ? (
                                <span className="flex-1 text-xs text-gray-600 text-center py-1">Send Letter to move to Outreach</span>
                              ) : idx < STAGES.length - 1 && <button onClick={e => { e.stopPropagation(); moveToStage(a, idx + 1); }}
                                className="flex-1 text-xs font-medium py-1 rounded text-white hover:brightness-110 transition-all" style={{ background: STAGES[idx + 1].color + '44', color: STAGES[idx + 1].color }}>
                                {STAGES[idx + 1].name} &#8594;
                              </button>}
                            </div>
                          </div>

    // ========== ANALYTICS ==========
    function Analytics() {
      const { state } = useStore();
      const { attorneys, seminars, attendees } = state;

      const completed = seminars.filter(s => s.status === 'completed');
      const totalAttendance = completed.reduce((s, e) => s + (e.actualAttendance || 0), 0);
      const totalConsultations = completed.reduce((s, e) => s + (e.consultationsBooked || 0), 0);
      const totalConsultationsDone = completed.reduce((s, e) => s + (e.consultationsCompleted || 0), 0);
      const totalConverted = completed.reduce((s, e) => s + (e.clientsConverted || 0), 0);
      const totalExpected = completed.reduce((s, e) => s + (e.expectedAttendance || 0), 0);

      // Funnel rates
      const attendToConsult = totalAttendance > 0 ? ((totalConsultations / totalAttendance) * 100).toFixed(1) : 0;
      const consultToClose = totalConsultations > 0 ? ((totalConverted / totalConsultations) * 100).toFixed(1) : 0;
      const attendToClose = totalAttendance > 0 ? ((totalConverted / totalAttendance) * 100).toFixed(1) : 0;
      const showRate = totalExpected > 0 ? ((totalAttendance / totalExpected) * 100).toFixed(1) : 0;

      // Revenue from attendee pipeline
      const totalPipelineRevenue = attendees.filter(a => a.stage >= 5).reduce((s, a) => s + (a.annualPremium || 0), 0);
      const totalEstPipeline = attendees.reduce((s, a) => s + (a.estimatedPremium || 0), 0);
      const clientsWon = attendees.filter(a => a.stage >= 5).length;
      const policyActive = attendees.filter(a => a.stage >= 6).length;

      // Seminar performance data for chart
      const seminarChartData = completed.slice(-8).map(s => ({
        label: s.date ? s.date.slice(5) : '?',
        value: s.actualAttendance || 0,
        color: '#4f6ef7'
      }));

      // Attorney pipeline chart
      const pipelineChartData = STAGES.map((s, i) => ({
        label: s.name.split(' ')[0],
        value: attorneys.filter(a => a.stage === i).length,
        color: s.color
      }));

      // Attendee funnel chart
      const funnelData = ATTENDEE_STAGES.map((s, i) => ({
        label: s.name.split(' ')[0],
        value: attendees.filter(a => a.stage === i).length,
        color: s.color
      }));

      // Product interest breakdown
      const productCounts = { IUL: 0, Annuity: 0, Both: 0, Undecided: 0 };
      attendees.forEach(a => { productCounts[a.productInterest] = (productCounts[a.productInterest] || 0) + 1; });

      // Venue breakdown
      const venueCounts = {};
      completed.forEach(s => { venueCounts[s.venue] = (venueCounts[s.venue] || 0) + 1; });

      return (
        <div className="fade-in space-y-6">
          <h1 className="text-2xl font-bold">Analytics</h1>

          {/* Key Metrics */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold">{completed.length}</div>
              <div className="text-sm text-gray-400">Seminars Completed</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold">{totalAttendance}</div>
              <div className="text-sm text-gray-400">Total Attendees</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold text-green-400">{clientsWon}</div>
              <div className="text-sm text-gray-400">Clients Won</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-3xl font-bold text-emerald-400">${totalPipelineRevenue.toLocaleString()}</div>
              <div className="text-sm text-gray-400">Annual Premium (Active)</div>
            </div>
          </div>

          {/* Conversion Funnel */}
          <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
            <h3 className="text-sm font-semibold text-gray-400 mb-4">Seminar Conversion Funnel</h3>
            <div className="flex items-center gap-2">
              {[
                { label: 'Expected', val: totalExpected, color: '#64748b' },
                { label: 'Attended', val: totalAttendance, color: '#3b82f6' },
                { label: 'Consult Booked', val: totalConsultations, color: '#8b5cf6' },
                { label: 'Consult Done', val: totalConsultationsDone, color: '#f59e0b' },
                { label: 'Converted', val: totalConverted, color: '#22c55e' }
              ].map((step, i, arr) => (
                <React.Fragment key={i}>
                  <div className="flex-1 text-center">
                    <div className="text-2xl font-bold" style={{ color: step.color }}>{step.val}</div>
                    <div className="text-xs text-gray-500 mt-1">{step.label}</div>
                    {i > 0 && arr[i-1].val > 0 && (
                      <div className="text-xs text-gray-600 mt-0.5">{((step.val / arr[i-1].val) * 100).toFixed(0)}%</div>
                    )}
                  </div>
                  {i < arr.length - 1 && <div className="text-gray-600">&#8594;</div>}
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Rate Cards */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-2xl font-bold text-blue-400">{showRate}%</div>
              <div className="text-xs text-gray-400">Show Rate</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-2xl font-bold text-purple-400">{attendToConsult}%</div>
              <div className="text-xs text-gray-400">Attend → Consult</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-2xl font-bold text-amber-400">{consultToClose}%</div>
              <div className="text-xs text-gray-400">Consult → Close</div>
            </div>
            <div className="bg-dark-800 rounded-xl p-4 border border-dark-600">
              <div className="text-2xl font-bold text-green-400">{attendToClose}%</div>
              <div className="text-xs text-gray-400">Attend → Close</div>
            </div>
          </div>

          {/* Charts Row */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-4">Attendance by Seminar</h3>
              {seminarChartData.length > 0 ? <BarChart data={seminarChartData} /> : <div className="text-gray-500 text-sm text-center py-8">No completed seminars yet</div>}
            </div>
            <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-4">Attorney Pipeline</h3>
              <BarChart data={pipelineChartData} />
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-4">Attendee Sales Funnel</h3>
              {attendees.length > 0 ? <BarChart data={funnelData} /> : <div className="text-gray-500 text-sm text-center py-8">No attendees tracked yet</div>}
            </div>
            <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-4">Product Interest</h3>
              <div className="space-y-3 mt-2">
                {Object.entries(productCounts).map(([product, count]) => (
                  <div key={product} className="flex items-center gap-3">
                    <span className="text-sm w-20">{product}</span>
                    <div className="flex-1 h-6 bg-dark-700 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all" style={{
                        width: attendees.length > 0 ? `${(count / attendees.length) * 100}%` : '0%',
                        background: product === 'IUL' ? '#4f6ef7' : product === 'Annuity' ? '#f59e0b' : product === 'Both' ? '#22c55e' : '#64748b'
                      }} />
                    </div>
                    <span className="text-sm font-bold w-8 text-right">{count}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Revenue Pipeline */}
          <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
            <h3 className="text-sm font-semibold text-gray-400 mb-4">Revenue Pipeline</h3>
            <div className="grid grid-cols-3 gap-4 text-center">
              <div>
                <div className="text-2xl font-bold text-gray-300">${totalEstPipeline.toLocaleString()}</div>
                <div className="text-xs text-gray-500 mt-1">Estimated Pipeline</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-green-400">${totalPipelineRevenue.toLocaleString()}</div>
                <div className="text-xs text-gray-500 mt-1">Won Revenue (Annual)</div>
              </div>
              <div>
                <div className="text-2xl font-bold text-amber-400">{totalEstPipeline > 0 ? ((totalPipelineRevenue / totalEstPipeline) * 100).toFixed(0) : 0}%</div>
                <div className="text-xs text-gray-500 mt-1">Win Rate (by $)</div>
              </div>
            </div>
          </div>

          {/* Venue Breakdown */}
          {Object.keys(venueCounts).length > 0 && (
            <div className="bg-dark-800 rounded-xl p-5 border border-dark-600">
              <h3 className="text-sm font-semibold text-gray-400 mb-3">Seminars by Venue</h3>
              <div className="flex gap-4">
                {Object.entries(venueCounts).map(([venue, count]) => (
                  <div key={venue} className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded-full" style={{ background: venue === 'AAA' ? '#4f6ef7' : venue === 'Total Wine' ? '#8b5cf6' : '#64748b' }} />
                    <span className="text-sm">{venue}</span>
                    <span className="text-sm font-bold">{count}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== EXPORT VIEW ==========
    function ExportView() {
      const { state } = useStore();
      const [tierFilter, setTierFilter] = useState('All');
      const [stageFilter, setStageFilter] = useState('All');
      const [vettingFilter, setVettingFilter] = useState('All');

      const filtered = useMemo(() => {
        let list = state.attorneys;
        if (tierFilter !== 'All') list = list.filter(a => getTier(a.score).label === tierFilter);
        if (stageFilter !== 'All') list = list.filter(a => a.stage === parseInt(stageFilter));
        if (vettingFilter !== 'All') list = list.filter(a => a.vettingDecision === vettingFilter);
        return list;
      }, [state.attorneys, tierFilter, stageFilter, vettingFilter]);

      return (
        <div className="fade-in">
          <h1 className="text-2xl font-bold mb-4">Export</h1>
          <div className="bg-dark-800 rounded-xl border border-dark-600 p-6">
            <p className="text-sm text-gray-400 mb-4">Export attorneys as CSV formatted for GoHighLevel import.</p>
            <div className="flex flex-wrap gap-3 mb-4">
              <select value={tierFilter} onChange={e => setTierFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
                <option value="All">All Tiers</option><option value="HOT">Hot</option><option value="WARM">Warm</option><option value="COLD">Cold</option>
              </select>
              <select value={stageFilter} onChange={e => setStageFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
                <option value="All">All Stages</option>
                {STAGES.map((s, i) => <option key={i} value={i}>{s.name}</option>)}
              </select>
              <select value={vettingFilter} onChange={e => setVettingFilter(e.target.value)} className="px-3 py-2 rounded-lg border text-sm">
                <option value="All">All Vetting</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="not_approved">Not Approved</option><option value="needs_followup">Needs Follow-up</option>
              </select>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-sm text-gray-400">{filtered.length} attorneys match filters</span>
              <button onClick={() => exportCSV(filtered)} disabled={filtered.length === 0}
                className="px-4 py-2 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white disabled:opacity-50 disabled:cursor-not-allowed">
                Download CSV
              </button>
            </div>
            <div className="mt-4 text-xs text-gray-500">Columns: First Name, Last Name, Firm, Email, Phone, Score, Tier, Stage, City, State, Vetting Decision, Partner Type</div>
          </div>
        </div>
      );
    }

    // ========== LAYOUT ==========
    const NAV_ITEMS = [
      { id: 'dashboard', label: 'Dashboard', icon: '◉' },
      { id: 'attorneys', label: 'Attorneys', icon: '◈' },
      { id: 'pipeline', label: 'Pipeline', icon: '▸' },
      { id: 'seminars', label: 'Seminars', icon: '◎' },
      { id: 'attendees', label: 'Attendees', icon: '◇' },
      { id: 'analytics', label: 'Analytics', icon: '▤' },
      { id: 'export', label: 'Export', icon: '↓' }
    ];

    // ========== LOGIN SCREEN ==========
    function LoginScreen({ onLogin }) {
      const [user, setUser] = useState('');
      const [pass, setPass] = useState('');
      const [error, setError] = useState('');

      function handleLogin(e) {
        e.preventDefault();
        if (user === 'admin' && pass === 'DuetAttorney!') {
          sessionStorage.setItem('crm_auth', 'true');
          onLogin();
        } else {
          setError('Invalid username or password');
        }
      }

      return (
        <div className="min-h-screen flex items-center justify-center" style={{ background: '#1a1a2e' }}>
          <div className="w-96 max-w-[90vw]">
            <div className="text-center mb-8">
              <div className="text-3xl font-bold text-white mb-1">DuetAttorney</div>
              <div className="text-sm text-gray-500">Prospecting & Vetting CRM</div>
            </div>
            <form onSubmit={handleLogin} className="bg-dark-800 rounded-xl border border-dark-600 p-6 space-y-4 shadow-2xl">
              <div>
                <label className="block text-xs text-gray-400 mb-1.5 font-medium">Username</label>
                <input value={user} onChange={e => { setUser(e.target.value); setError(''); }} autoFocus
                  className="w-full px-4 py-2.5 rounded-lg border text-sm" placeholder="Enter username" />
              </div>
              <div>
                <label className="block text-xs text-gray-400 mb-1.5 font-medium">Password</label>
                <input type="password" value={pass} onChange={e => { setPass(e.target.value); setError(''); }}
                  className="w-full px-4 py-2.5 rounded-lg border text-sm" placeholder="Enter password" />
              </div>
              {error && <div className="text-red-400 text-sm text-center bg-red-500/10 rounded-lg py-2">{error}</div>}
              <button type="submit" className="w-full py-2.5 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white transition-colors">Sign In</button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(sessionStorage.getItem('crm_auth') === 'true');
      const [view, setView] = useState('dashboard');

      if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

      return (
        <StoreProvider>
          <div className="flex h-screen">
            <div className="w-56 bg-dark-800 border-r border-dark-600 flex flex-col flex-shrink-0">
              <div className="p-4 border-b border-dark-600">
                <div className="text-lg font-bold text-white">DuetAttorney</div>
                <div className="text-xs text-gray-500">Prospecting & Vetting CRM</div>
              </div>
              <nav className="flex-1 p-2">
                {NAV_ITEMS.map(item => (
                  <button key={item.id} onClick={() => setView(item.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm mb-0.5 transition-colors ${view === item.id ? 'bg-navy-600/20 text-navy-400 font-medium' : 'text-gray-400 hover:bg-dark-700 hover:text-gray-200'}`}>
                    <span className="text-base">{item.icon}</span>
                    {item.label}
                  </button>
                ))}
              </nav>
              <div className="p-3 border-t border-dark-600 space-y-2">
                <div className="flex gap-2">
                  <button onClick={() => {
                    const backup = {
                      attorneys: loadStorage('crm_attorneys', []),
                      seminars: loadStorage('crm_seminars', []),
                      programSetup: loadStorage('crm_programSetup', {}),
                      attendees: loadStorage('crm_attendees', []),
                      feedback: loadStorage('crm_feedback', []),
                      exportedAt: new Date().toISOString()
                    };
                    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `duetattorney-backup-${new Date().toISOString().split('T')[0]}.json`;
                    a.click(); URL.revokeObjectURL(url);
                  }} className="flex-1 px-2 py-1.5 text-xs rounded-lg bg-dark-700 border border-dark-600 text-gray-400 hover:text-white hover:border-dark-500">Backup</button>
                  <button onClick={() => {
                    const input = document.createElement('input');
                    input.type = 'file'; input.accept = '.json';
                    input.onchange = (e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (ev) => {
                        try {
                          const data = JSON.parse(ev.target.result);
                          if (data.attorneys) { saveStorage('crm_attorneys', data.attorneys); }
                          if (data.seminars) { saveStorage('crm_seminars', data.seminars); }
                          if (data.programSetup) { saveStorage('crm_programSetup', data.programSetup); }
                          if (data.attendees) { saveStorage('crm_attendees', data.attendees); }
                          if (data.feedback) { saveStorage('crm_feedback', data.feedback); }
                          window.location.reload();
                        } catch { alert('Invalid backup file'); }
                      };
                      reader.readAsText(file);
                    };
                    input.click();
                  }} className="flex-1 px-2 py-1.5 text-xs rounded-lg bg-dark-700 border border-dark-600 text-gray-400 hover:text-white hover:border-dark-500">Restore</button>
                </div>
                <button onClick={() => {
                  if (confirm('Are you sure you want to reset ALL data? This cannot be undone. Make sure you have a backup first.')) {
                    if (confirm('This will delete all attorneys, seminars, attendees, and feedback. Really reset?')) {
                      localStorage.removeItem('crm_attorneys');
                      localStorage.removeItem('crm_seminars');
                      localStorage.removeItem('crm_programSetup');
                      localStorage.removeItem('crm_attendees');
                      localStorage.removeItem('crm_feedback');
                      window.location.reload();
                    }
                  }
                }} className="w-full px-2 py-1.5 text-xs rounded-lg border border-red-500/30 text-red-400/60 hover:text-red-400 hover:border-red-500/50">Reset All Data</button>
                <button onClick={() => { sessionStorage.removeItem('crm_auth'); window.location.reload(); }}
                  className="w-full px-2 py-1.5 text-xs rounded-lg border border-dark-600 text-gray-500 hover:text-white hover:border-dark-500 mb-2">Sign Out</button>
                <div className="text-xs text-gray-600">Phase 2 — Download + Analytics</div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-6">
              {view === 'dashboard' && <Dashboard />}
              {view === 'attorneys' && <AttorneyList />}
              {view === 'pipeline' && <PipelineBoard />}
              {view === 'seminars' && <Seminars />}
              {view === 'attendees' && <AttendeePipeline />}
              {view === 'analytics' && <Analytics />}
              {view === 'export' && <ExportView />}
            </div>

            <FeedbackBubble />
          </div>
        </StoreProvider>
      );
    }

    // ========== FEEDBACK BUBBLE ==========
    function FeedbackBubble() {
      const { state, dispatch } = useStore();
      const [open, setOpen] = useState(false);
      const [form, setForm] = useState({ name: '', type: 'suggestion', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const feedbackList = loadStorage('crm_feedback', []);

      function handleSubmit() {
        if (!form.message.trim()) return;
        const entry = { id: genId(), ...form, date: new Date().toISOString() };
        const updated = [...feedbackList, entry];
        saveStorage('crm_feedback', updated);
        setForm({ name: '', type: 'suggestion', message: '' });
        setSubmitted(true);
        setTimeout(() => setSubmitted(false), 3000);
      }

      return (
        <div className="fixed bottom-6 right-6 z-50">
          {open && (
            <div className="bg-dark-800 rounded-xl shadow-2xl border border-dark-600 w-80 mb-3 fade-in">
              <div className="flex items-center justify-between p-4 border-b border-dark-600">
                <h3 className="text-sm font-semibold">Feedback & Suggestions</h3>
                <button onClick={() => setOpen(false)} className="text-gray-400 hover:text-white text-lg">&times;</button>
              </div>
              <div className="p-4 space-y-3">
                {submitted ? (
                  <div className="text-center py-6">
                    <div className="text-3xl mb-2">&#10003;</div>
                    <div className="text-green-400 font-medium">Thank you!</div>
                    <div className="text-xs text-gray-500 mt-1">Your feedback has been saved.</div>
                  </div>
                ) : (
                  <>
                    <div>
                      <label className="text-xs text-gray-400 mb-1 block">Your Name (optional)</label>
                      <input value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} placeholder="Name" className="w-full px-3 py-2 rounded-lg border text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 mb-1 block">Type</label>
                      <select value={form.type} onChange={e => setForm(p => ({ ...p, type: e.target.value }))} className="w-full px-3 py-2 rounded-lg border text-sm">
                        <option value="suggestion">Suggestion</option>
                        <option value="bug">Bug Report</option>
                        <option value="feature">Feature Request</option>
                        <option value="general">General Feedback</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 mb-1 block">Message</label>
                      <textarea value={form.message} onChange={e => setForm(p => ({ ...p, message: e.target.value }))} rows={4} placeholder="Share your thoughts, ideas, or report an issue..." className="w-full px-3 py-2 rounded-lg border text-sm" />
                    </div>
                    <button onClick={handleSubmit} disabled={!form.message.trim()}
                      className="w-full px-4 py-2 rounded-lg text-sm font-semibold bg-navy-600 hover:bg-navy-500 text-white disabled:opacity-50 disabled:cursor-not-allowed">Submit Feedback</button>
                  </>
                )}
                {/* Show recent feedback */}
                {feedbackList.length > 0 && !submitted && (
                  <div className="border-t border-dark-600 pt-3 mt-2">
                    <div className="text-xs text-gray-500 mb-2">Recent ({feedbackList.length})</div>
                    <div className="space-y-1.5 max-h-32 overflow-y-auto">
                      {[...feedbackList].reverse().slice(0, 5).map(f => (
                        <div key={f.id} className="bg-dark-700 rounded p-2 text-xs">
                          <div className="flex items-center justify-between mb-0.5">
                            <span className={`font-medium capitalize ${f.type === 'bug' ? 'text-red-400' : f.type === 'feature' ? 'text-purple-400' : f.type === 'suggestion' ? 'text-amber-400' : 'text-gray-400'}`}>{f.type}</span>
                            <span className="text-gray-600">{new Date(f.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
                          </div>
                          <div className="text-gray-400 truncate">{f.message}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
          <button onClick={() => { setOpen(!open); setSubmitted(false); }}
            className="w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-xl transition-transform hover:scale-110" style={{ background: '#534AB7', boxShadow: '0 4px 14px rgba(83,74,183,0.4)' }}
            title="Feedback & Suggestions">
            &#128161;
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
